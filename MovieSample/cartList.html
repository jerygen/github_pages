<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Insert title here</title>
    <link rel="stylesheet" type="text/css" href="css/basic.css" />
    <style type="text/css">
      .poster {
        width: 150px;
        height: 150px;
      }

      a {
        text-decoration: none;
      }
    </style>

    <script type="text/javascript"></script>
  </head>
  <body>
    <button name="delItem">삭제</button>
    <hr />
    <article class="main">
      <section>
        <table width="80%" align="center">
          <caption class="caption">
            찜 리스트
          </caption>
          <thead>
            <tr>
              <th>이미지</th>
              <th>상품번호</th>
              <th>상품이름</th>
              <th>가격</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="content">
            <!-- 찜목록 출력 -->
          </tbody>
        </table>
      </section>
      <section class="toalprice" id="price">
        <!-- 가격 -->
      </section>
      <section class="link">
        <table align="center">
          <tr>
            <td align="center">
              <a href="">주문하러 가기</a>
              <a href="index.html">DVD LIST</a>
            </td>
          </tr>
        </table>
      </section>
    </article>
    <script>
      document.querySelector("#content").innerHTML = "";

      for (let i = 0; i < localStorage.length; i++) {
        let mvId = localStorage.key(i);
        let data = localStorage.getItem(mvId);

        const [mvName, mvImg, mvPrice] = data.split(",");
        let formattedPrice = Number(mvPrice).toLocaleString();
        document.querySelector("#content").innerHTML += `<tr>
      <td><img class="poster" src="${mvImg}"></td>
      <td>${mvName}</td>
      <td>${mvId}</td>
      <td>${formattedPrice}원</td>
      <td><input type="button" data-movie-id='${mvId}' value="삭제" /></td>
      </tr>`;
      }

      //총 가격 합계
      let totalPrice = 0;
      function sumPrice() {
        totalPrice = 0;
        for (let i = 0; i < localStorage.length; i++) {
          let mvId = localStorage.key(i);
          let data = localStorage.getItem(mvId);

          const [mvName, mvImg, mvPrice] = data.split(",");
          totalPrice += Number(mvPrice);
        }
        document.querySelector("#price").innerHTML =
          `<p>총 합계: ${totalPrice.toLocaleString()}원</p>`;
      }
      sumPrice();

      //삭제하기
      document.body.addEventListener(
        "click",
        (event) => {
          if (event.target.matches("[value=삭제]")) {
            let tr = event.target.parentElement.parentElement; //button->td->tr
            //tr삭제
            tr.parentElement.removeChild(tr);
            let mvId = event.target.getAttribute("data-movie-id");
            //localeStorage 데이터 삭제
            if (mvId) localStorage.removeItem(mvId);

            sumPrice();
          }
        },
        false,
      );
    </script>
  </body>
</html>
